spec:
  inputs:
    target_branch:
      default: "main"
      description: "Branch the agent should create merge requests against."
    ollama_base_url:
      default: "http://127.0.0.1:11434"
      description: "Local Ollama endpoint available to the runner."
    ollama_model:
      default: "qwen3-coder:30b"
      description: "Local Ollama model for review generation."
---

stages:
  - feedback

agent-review:
  stage: feedback
  tags:
    - ollama
  image: python:3.12-slim
  variables:
    OPENBEAGLE_AGENT_TARGET_BRANCH: "$[[ inputs.target_branch ]]"
    OPENBEAGLE_OLLAMA_BASE_URL: "$[[ inputs.ollama_base_url ]]"
    OPENBEAGLE_OLLAMA_MODEL: "$[[ inputs.ollama_model ]]"
  rules:
    # Run automatically on any branch push.
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH'
      when: on_success

    # Also allow manual Run Pipeline from the UI.
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success

    # Otherwise do not add the job.
    - when: never
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git curl jq ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - python --version
  script:
    - mkdir -p out
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE"
    - echo "CI_COMMIT_BRANCH=${CI_COMMIT_BRANCH:-}"
    - echo "CI_DEFAULT_BRANCH=${CI_DEFAULT_BRANCH:-}"
    - echo "OPENBEAGLE_AGENT_TARGET_BRANCH=$OPENBEAGLE_AGENT_TARGET_BRANCH"
    - echo "OPENBEAGLE_OLLAMA_BASE_URL=$OPENBEAGLE_OLLAMA_BASE_URL"
    - echo "OPENBEAGLE_OLLAMA_MODEL=$OPENBEAGLE_OLLAMA_MODEL"
    - echo "Testing Ollama connectivity..."
    - getent hosts host.docker.internal || true
    - ip route || true
    - curl -v --fail-with-body "$OPENBEAGLE_OLLAMA_BASE_URL/api/tags" -o out/ollama-tags.json
    - cat out/ollama-tags.json
    - jq '.models[].name' out/ollama-tags.json    - curl -s "$OPENBEAGLE_OLLAMA_BASE_URL/api/tags" | jq '.models[].name'
    - bash scripts/collect_commit_context.sh > out/commit_context.json
    - python scripts/generate_agent_review.py out/commit_context.json > out/agent-review.md
    - bash scripts/create_or_update_mr.sh out/agent-review.md
  artifacts:
    when: always
    paths:
      - out/commit_context.json
      - out/agent-review.md
    expire_in: 7 days