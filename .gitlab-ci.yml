stages:
  - feedback

variables:
  OPENBEAGLE_OLLAMA_BASE_URL: "http://127.0.0.1:11434"
  OPENBEAGLE_OLLAMA_MODEL: "qwen3-coder:30b"
  OPENBEAGLE_AGENT_TARGET_BRANCH: "main"
  OPENBEAGLE_AGENT_MR_TITLE_PREFIX: "Agent review"

agent-review:
  stage: feedback
  tags:
    - ollama
  image: python:3.12-slim
  rules:
    # Run on ordinary branch pushes.
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'

    # Allow manual testing from the GitLab UI.
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true

    # Do not run from MR pipelines. This job creates/updates MRs.
    - when: never
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git curl jq ca-certificates
    - rm -rf /var/lib/apt/lists/*
    - python --version
  script:
    - mkdir -p out
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE"
    - echo "CI_COMMIT_BRANCH=$CI_COMMIT_BRANCH"
    - echo "CI_DEFAULT_BRANCH=$CI_DEFAULT_BRANCH"
    - curl -s "$OPENBEAGLE_OLLAMA_BASE_URL/api/tags" | jq '.models[].name'
    - bash scripts/collect_commit_context.sh > out/commit_context.json
    - python scripts/generate_agent_review.py out/commit_context.json > out/agent-review.md
    - bash scripts/create_or_update_mr.sh out/agent-review.md
  artifacts:
    when: always
    paths:
      - out/commit_context.json
      - out/agent-review.md
    expire_in: 7 days